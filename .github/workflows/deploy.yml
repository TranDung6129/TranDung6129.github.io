name: Hugo build and deploy
on:
  push:
    branches: [ main ]
    paths:
      - 'layouts/**'
      - 'config/**'
      - 'content/**'
      - 'data/**'
      - 'static/**'
      - 'themes/**'
      - 'hugo.toml'
      - '.nojekyll'
  workflow_run:
    workflows: ['Update theme']
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ vars.HUGO_VERSION || 'latest' }}
          extended: true
      - name: Hugo build
        run: hugo --gc --minify --logLevel info > hugo_error.log 2>&1 || (cat hugo_error.log && exit 1)
      - name: Append error to PR or Commit
        if: failure()
        run: |
          ERROR_DETAILS=$(cat hugo_error.log)
          curl -L -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments -d "{\"body\":\"Hugo build failed:\n\`\`\`\n${ERROR_DETAILS}\n\`\`\`\"}"
      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v4
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
